# Example ESPHome configuration for controlling Power Smart roller shutter
# remotes from an ESP32 + CC1101 module.
#
# This uses ESPHome's official `cc1101:` component for all radio handling;
# the custom `power_smart:` component only adds the Power Smart protocol
# encoder and the send_command action.
#
# WIRING (common 8-pin CC1101 breakout, 26MHz crystal):
#   CC1101 VCC  -> ESP32 3.3V   (NOT 5V)
#   CC1101 GND  -> ESP32 GND
#   CC1101 SCK  -> ESP32 GPIO18 (any SPI-capable pin)
#   CC1101 MOSI -> ESP32 GPIO23
#   CC1101 MISO -> ESP32 GPIO19
#   CC1101 CSN  -> ESP32 GPIO5
#   CC1101 GDO0 -> ESP32 GPIO4  (the pin the RF data is bit-banged on)
#   CC1101 GDO2 -> not used, leave unconnected
#
# Getting remote_id / channel for each of your 4 physical remotes:
#   Capture a button press with your Flipper Zero, note the "Key:" hex value,
#   then run it through decode_key.py:
#     python3 decode_key.py FDC136ACAA3EC952
#   which prints the remote_id to put in the substitutions below.

esphome:
  name: shutter-controller
  friendly_name: Shutter Controller

esp32:
  board: esp32dev
  framework:
    type: esp-idf

# --- fill these in after decoding a capture from each physical remote ---
substitutions:
  remote_1_id: "0x9BAC"   # TODO: replace with your remote's actual ID or 0xE001-0xE999 should work but is untested
  remote_2_id: "0xE001"   
  remote_3_id: "0xE002"   
  remote_4_id: "0xE003" 

# ... (your existing wifi/api/ota/logger config goes here) ...

external_components:
  - source:
      type: git
      url: https://github.com/plains203/powersmart_remote_esphome
      ref: main            # optional
    components: [power_smart]

spi:
  clk_pin: GPIO18
  mosi_pin: GPIO23
  miso_pin: GPIO19

# Official ESPHome CC1101 driver - handles SPI, registers, PA table,
# frequency synthesis and TX/IDLE state transitions.
cc1101:
  id: cc1101_radio
  cs_pin: GPIO5
  frequency: 433.43MHz        # matches this remote's captures
  modulation_type: "ASK/OOK"
  output_power: 10            # dBm - check your local low-power/ISM band rules
  # Manchester is done in software by the power_smart encoder (to match the
  # exact Flipper timing), so leave the CC1101's own manchester setting off.
  manchester: false

remote_transmitter:
  id: cc1101_tx
  pin: GPIO4
  # 100% duty = plain on/off keying, no IR-style sub-carrier - this drives
  # CC1101's GDO0 (async OOK data in) directly.
  carrier_duty_percent: 100%
  # A full Power Smart burst is ~7 seconds (matching the Flipper). It must
  # run non-blocking so the RMT peripheral clocks it out in the background;
  # blocking the main loop that long would trip the task watchdog and reset
  # the ESP.
  non_blocking: true

power_smart:
  id: shutter_radio
  cc1101_id: cc1101_radio
  remote_transmitter_id: cc1101_tx
  repeat: 3                  # matches the default Flipper Zero replay behaviour

button:
  - platform: template
    name: "Shutter R1 Ch1 Up"
    id: shutter_r1_c1_up
    on_press:
      - power_smart.send_command:
          remote_id: ${remote_1_id}
          channel: 1
          command: UP
  - platform: template
    name: "Shutter R1 Ch1 Stop"
    id: shutter_r1_c1_stop
    on_press:
      - power_smart.send_command:
          remote_id: ${remote_1_id}
          channel: 1
          command: STOP
  - platform: template
    name: "Shutter R1 Ch1 Down"
    id: shutter_r1_c1_down
    on_press:
      - power_smart.send_command:
          remote_id: ${remote_1_id}
