# =============================================================================
# Power Smart roller shutter controller
# Wemos S2 Mini + E07-M1101D-SMA (CC1101) module
# =============================================================================
#
# WIRING (E07-M1101D-SMA V2.0, 8-pin  ->  Wemos S2 Mini):
#   E07 pin 1  GND   -> GND
#   E07 pin 2  VCC   -> 3V3        (3.3V only - NEVER 5V)
#   E07 pin 3  GDO0  -> GPIO4      (RF data line driven by remote_transmitter)
#   E07 pin 4  CSN   -> GPIO12     (SPI chip select)
#   E07 pin 5  SCK   -> GPIO7      (SPI clock,  native FSPI)
#   E07 pin 6  MOSI  -> GPIO11     (SPI MOSI,   native FSPI)
#   E07 pin 7  MISO  -> GPIO9      (SPI MISO,   native FSPI)
#   E07 pin 8  GDO2  -> not connected
#
# Before soldering: check your module's silkscreen labels match the order
# above - the E07 has had pinout revisions. If the cc1101 component logs a
# chip-ID mismatch at boot, it's almost always a swapped MISO/MOSI or CSN.
#
# SETUP:
#   1. Capture a button press from each remote with your Flipper Zero, then:
#        python3 decode_key.py FDC136ACAA3EC952
#      to get each remote_id, and fill them into substitutions below.
#   2. The component folder (containing components/power_smart/) must sit in
#      the same directory as this YAML, or adjust external_components: source.
# =============================================================================

esphome:
  name: powersmart1
  friendly_name: PowerSmart Controller 1

esp32:
  board: lolin_s2_mini
  framework:
    type: esp-idf

# --- fill these in after decoding a capture from each physical remote ---
substitutions:
  remote_1_id: "0x9BAC"   # TODO: replace with your remote's actual ID
  remote_2_id: "0x0000"   # TODO
  remote_3_id: "0x0000"   # TODO
  remote_4_id: "0x0000"   # TODO

# -----------------------------------------------------------------------------
# Connectivity  (replace with your own secrets / network details)
# -----------------------------------------------------------------------------
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret api_encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

logger:

# -----------------------------------------------------------------------------
# Power Smart component + CC1101 radio
# -----------------------------------------------------------------------------
external_components:
  - source:
      type: git
      url: https://github.com/plains203/powersmart_remote_esphome
      ref: main            # optional
    components: [power_smart]

spi:
  clk_pin: GPIO7
  mosi_pin: GPIO11
  miso_pin: GPIO9

# Official ESPHome CC1101 driver - handles SPI, registers, PA table,
# frequency synthesis and TX/IDLE state transitions.
cc1101:
  id: cc1101_radio
  cs_pin: GPIO12
  frequency: 433.43MHz        # matches this remote's captures
  modulation_type: "ASK/OOK"
  output_power: 10            # dBm - check your local low-power/ISM band rules
  # Manchester is done in software by the power_smart encoder (to match the
  # exact Flipper timing), so leave the CC1101's own manchester setting off.
  manchester: false

remote_transmitter:
  id: cc1101_tx
  pin: GPIO4
  # 100% duty = plain on/off keying, no IR-style sub-carrier - this drives
  # CC1101's GDO0 (async OOK data in) directly.
  carrier_duty_percent: 100%
  # A full Power Smart burst is ~7 seconds (matching the Flipper). It must
  # run non-blocking so the RMT peripheral clocks it out in the background;
  # blocking the main loop that long would trip the task watchdog and reset
  # the ESP.
  non_blocking: true

power_smart:
  id: shutter_radio
  cc1101_id: cc1101_radio
  remote_transmitter_id: cc1101_tx
  repeat: 3                  # matches the default Flipper Zero replay behaviour

# -----------------------------------------------------------------------------
# Buttons: 4 remotes x 6 channels x (Up / Stop / Down)
# -----------------------------------------------------------------------------
button:
  - platform: template
    name: "Shutter R1 Ch1 Up"
    id: shutter_r1_c1_up
    on_press:
      - power_smart.send_command:
          remote_id: ${remote_1_id}
          channel: 1
          command: UP
  - platform: template
    name: "Shutter R1 Ch1 Stop"
    id: shutter_r1_c1_stop
    on_press:
      - power_smart.send_command:
